<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NexHost V5 — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/shared.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Cairo', sans-serif;
    position: relative;
  }

  /* Animated Particles Background */
  .particles-container {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
  }

  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0.3;
    animation: float 15s infinite;
  }

  @keyframes float {
    0%, 100% {
      transform: translateY(100vh) rotate(0deg);
      opacity: 0;
    }
    10% {
      opacity: 0.3;
    }
    90% {
      opacity: 0.3;
    }
    100% {
      transform: translateY(-100vh) rotate(720deg);
      opacity: 0;
    }
  }

  /* Grid Background */
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,216,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,216,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridMove {
    0% { background-position: 0 0; }
    100% { background-position: 50px 50px; }
  }

  /* Glow Orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    pointer-events: none;
    animation: orbFloat 10s ease-in-out infinite;
  }

  .orb1 {
    width: 500px;
    height: 500px;
    background: rgba(0,216,255,0.08);
    top: -200px;
    right: -200px;
    animation-delay: 0s;
  }

  .orb2 {
    width: 400px;
    height: 400px;
    background: rgba(124,58,237,0.1);
    bottom: -150px;
    left: -150px;
    animation-delay: 5s;
  }

  .orb3 {
    width: 300px;
    height: 300px;
    background: rgba(0,255,136,0.05);
    top: 50%;
    left: 30%;
    animation-delay: 2s;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -30px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.9); }
  }

  /* Login Card */
  .login-card {
    width: 440px;
    max-width: 92vw;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 36px;
    position: relative;
    z-index: 10;
    animation: cardIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    box-shadow:
      0 0 0 1px rgba(0,216,255,0.05),
      0 50px 100px rgba(0,0,0,0.5),
      0 0 80px rgba(0,216,255,0.08);
    backdrop-filter: blur(10px);
  }

  @keyframes cardIn {
    from { 
      opacity: 0; 
      transform: translateY(40px) scale(0.95);
    }
    to { 
      opacity: 1; 
      transform: translateY(0) scale(1);
    }
  }

  /* Top Accent Line */
  .login-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 15%;
    right: 15%;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    border-radius: 3px;
    animation: accentGlow 3s ease-in-out infinite;
  }

  @keyframes accentGlow {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* Logo Section */
  .logo-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 32px;
    gap: 12px;
  }

  .logo-icon-wrapper {
    position: relative;
  }

  .logo-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    box-shadow: 0 0 40px rgba(0,216,255,0.4), 0 0 80px rgba(0,216,255,0.15);
    animation: iconGlow 3s ease-in-out infinite;
    position: relative;
    z-index: 1;
  }

  .logo-icon-ring {
    position: absolute;
    inset: -8px;
    border: 2px solid rgba(0,216,255,0.2);
    border-radius: 28px;
    animation: ringPulse 2s ease-in-out infinite;
  }

  @keyframes iconGlow {
    0%, 100% { 
      box-shadow: 0 0 40px rgba(0,216,255,0.4), 0 0 80px rgba(0,216,255,0.15);
      transform: scale(1);
    }
    50% { 
      box-shadow: 0 0 60px rgba(0,216,255,0.6), 0 0 100px rgba(0,216,255,0.25);
      transform: scale(1.02);
    }
  }

  @keyframes ringPulse {
    0%, 100% { 
      transform: scale(1);
      opacity: 0.5;
    }
    50% { 
      transform: scale(1.05);
      opacity: 0.8;
    }
  }

  .logo-name {
    font-size: 32px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -1px;
    text-shadow: 0 0 30px rgba(0,216,255,0.3);
  }

  .logo-tag {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent);
    letter-spacing: 4px;
    border: 1px solid rgba(0,216,255,0.25);
    padding: 4px 16px;
    border-radius: 20px;
    background: rgba(0,216,255,0.05);
  }

  /* Heading */
  .heading {
    text-align: center;
    margin-bottom: 28px;
  }

  .heading h2 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }

  .heading p {
    font-size: 14px;
    color: var(--muted);
  }

  /* Form */
  .form {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    right: 16px;
    font-size: 16px;
    color: var(--muted);
    pointer-events: none;
    transition: color 0.2s;
  }

  .input-wrap input:focus ~ .input-icon {
    color: var(--accent);
  }

  .input-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 48px 14px 48px;
    color: #fff;
    font-size: 15px;
    font-family: 'Cairo', sans-serif;
    outline: none;
    transition: all 0.25s;
    direction: ltr;
    text-align: right;
    min-height: 52px;
  }

  .input-wrap input::placeholder {
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
  }

  .input-wrap input:focus {
    border-color: var(--accent);
    background: rgba(0,216,255,0.04);
    box-shadow: 0 0 0 4px rgba(0,216,255,0.1);
  }

  /* Show/Hide Password Button */
  .eye-btn {
    position: absolute;
    left: 12px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 8px;
    border-radius: 8px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 40px;
    min-height: 40px;
  }

  .eye-btn:hover {
    color: var(--accent);
    background: rgba(0,216,255,0.1);
  }

  /* Remember + Forget Row */
  .form-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: -4px;
  }

  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }

  .checkbox-label input[type="checkbox"] {
    display: none;
  }

  .custom-check {
    width: 20px;
    height: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    font-size: 12px;
  }

  .checkbox-label input:checked ~ .custom-check {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .forget-link {
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
  }

  .forget-link:hover {
    opacity: 0.8;
    text-decoration: underline;
  }

  /* Submit Button */
  .submit-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #0099cc);
    color: #000;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 0 30px rgba(0,216,255,0.3);
    min-height: 56px;
    position: relative;
    overflow: hidden;
  }

  .submit-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: translateX(-100%);
    transition: transform 0.6s;
  }

  .submit-btn:hover:not(:disabled)::before {
    transform: translateX(100%);
  }

  .submit-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 0 40px rgba(0,216,255,0.5);
  }

  .submit-btn:active {
    transform: translateY(0);
  }

  .submit-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
  }

  /* Loading State */
  .submit-btn.loading .btn-text {
    opacity: 0;
  }

  .submit-btn .spinner {
    display: none;
    width: 22px;
    height: 22px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    position: absolute;
  }

  .submit-btn.loading .spinner {
    display: block;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Status Bar */
  .status-bar {
    margin-top: 28px;
    padding: 14px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-dot-wrap {
    width: 10px;
    height: 10px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--green);
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }

  .status-dot-wrap.offline {
    background: var(--red);
    box-shadow: 0 0 12px var(--red);
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.1); }
  }

  .status-text {
    font-size: 13px;
    color: var(--muted);
    flex: 1;
  }

  .status-text strong {
    color: var(--green);
  }

  .status-text strong.offline {
    color: var(--red);
  }

  .version-tag {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    background: var(--surface);
    padding: 4px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  /* Error Message */
  .error-msg {
    display: none;
    padding: 12px 16px;
    background: rgba(255,68,102,0.1);
    border: 1px solid rgba(255,68,102,0.25);
    border-radius: 12px;
    font-size: 14px;
    color: var(--red);
    text-align: center;
    animation: shake 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  /* Success Animation */
  .success-check {
    display: none;
    width: 60px;
    height: 60px;
    background: var(--green);
    border-radius: 50%;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 20px;
    animation: successPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }

  @keyframes successPop {
    0% { transform: scale(0); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  /* Maintenance Screen */
  .maintenance-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9998;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
    text-align: center;
    padding: 40px;
  }

  .maintenance-screen.active {
    display: flex;
    animation: fadeIn 0.5s ease;
  }

  .maintenance-icon {
    font-size: 80px;
    animation: spin 4s linear infinite;
  }

  .maintenance-title {
    font-size: 28px;
    font-weight: 900;
    color: #fff;
  }

  .maintenance-msg {
    font-size: 15px;
    color: var(--muted);
    max-width: 400px;
    line-height: 1.6;
  }

  .maintenance-timer {
    font-size: 14px;
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    background: var(--surface);
    padding: 10px 20px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  /* Mobile Responsive */
  @media (max-width: 480px) {
    .login-card {
      padding: 32px 24px;
      border-radius: 20px;
    }
    
    .logo-icon {
      width: 60px;
      height: 60px;
      font-size: 28px;
    }
    
    .logo-name {
      font-size: 26px;
    }
    
    .heading h2 {
      font-size: 20px;
    }
    
    .input-wrap input {
      padding: 14px 44px 14px 44px;
      font-size: 16px;
    }
    
    .submit-btn {
      padding: 16px;
      font-size: 16px;
      min-height: 56px;
    }
  }

  /* Reduced Motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<!-- Particles Background -->
<div class="particles-container" id="particlesContainer"></div>

<!-- Grid Background -->
<div class="grid-bg"></div>

<!-- Glow Orbs -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- Maintenance Screen -->
<div class="maintenance-screen" id="maintenanceScreen">
  <div class="maintenance-icon">🔧</div>
  <div class="maintenance-title" id="maintenanceTitle">النظام تحت الصيانة</div>
  <div class="maintenance-msg" id="maintenanceMsg">النظام تحت الصيانة، سيعود قريباً 🔧</div>
  <div class="maintenance-timer" id="maintenanceTimer"></div>
</div>

<!-- Login Card -->
<div class="login-card" id="loginCard">

  <div class="logo-section">
    <div class="logo-icon-wrapper">
      <div class="logo-icon-ring"></div>
      <div class="logo-icon">⚡</div>
    </div>
    <div class="logo-name">NexHost</div>
    <div class="logo-tag">HOSTING PANEL V5</div>
  </div>

  <div class="heading">
    <h2>مرحباً بعودتك 👋</h2>
    <p>سجّل دخولك للوصول إلى لوحة التحكم</p>
  </div>

  <div class="success-check" id="successCheck">✓</div>

  <div class="form" id="loginForm">

    <div id="errorMsg" class="error-msg"></div>

    <div class="field">
      <label>👤 اسم المستخدم</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="off" />
        <span class="input-icon">👤</span>
      </div>
    </div>

    <div class="field">
      <label>🔒 كلمة المرور</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="أدخل كلمة المرور" autocomplete="off" />
        <span class="input-icon">🔒</span>
        <button class="eye-btn" type="button" onclick="togglePass()" id="eyeBtn" aria-label="إظهار/إخفاء كلمة المرور">
          👁
        </button>
      </div>
    </div>

    <div class="form-row">
      <label class="checkbox-label">
        <input type="checkbox" id="remember">
        <span class="custom-check" id="checkBox">✓</span>
        تذكرني
      </label>
      <span class="forget-link" onclick="showToast('يرجى التواصل مع المشرف', 'info')">نسيت كلمة المرور؟</span>
    </div>

    <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
      <div class="spinner"></div>
      <span class="btn-text">🚀 دخول للوحة التحكم</span>
    </button>

  </div>

  <div class="status-bar">
    <div class="status-dot-wrap" id="statusDot"></div>
    <div class="status-text">حالة السيرفر: <strong id="serverStatus">جاري التحقق...</strong></div>
    <div class="version-tag">v5.0.0</div>
  </div>

</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/utils.js"></script>
<script>
  // Generate particles
  function generateParticles() {
    const container = document.getElementById('particlesContainer');
    const particleCount = window.innerWidth < 768 ? 15 : 30;
    
    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 15 + 's';
      particle.style.animationDuration = (10 + Math.random() * 10) + 's';
      container.appendChild(particle);
    }
  }

  // Check if already logged in
  if (TokenManager.isLoggedIn()) {
    window.location.href = 'hosting-panel.html';
  }

  // Toggle password visibility
  function togglePass() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('eyeBtn');
    if (inp.type === 'password') {
      inp.type = 'text';
      btn.textContent = '🙈';
    } else {
      inp.type = 'password';
      btn.textContent = '👁';
    }
  }

  // Checkbox toggle
  document.getElementById('remember').addEventListener('change', function() {
    const box = document.getElementById('checkBox');
    if (this.checked) {
      box.style.background = 'var(--accent)';
      box.style.borderColor = 'var(--accent)';
      box.style.color = '#000';
    } else {
      box.style.background = 'var(--surface2)';
      box.style.borderColor = 'var(--border)';
      box.style.color = 'transparent';
    }
  });

  // Handle login
  async function handleLogin() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');

    if (!user || !pass) {
      err.textContent = '⚠️ يرجى تعبئة جميع الحقول';
      err.style.display = 'block';
      return;
    }

    // Loading state
    btn.classList.add('loading');
    btn.disabled = true;
    err.style.display = 'none';

    try {
      const result = await AuthAPI.login(user, pass);
      
      if (result.success) {
        // Show success animation
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('successCheck').style.display = 'flex';
        document.querySelector('.heading').innerHTML = `
          <h2>تم تسجيل الدخول بنجاح! ✅</h2>
          <p>جاري التحويل...</p>
        `;
        
        showToast('تم تسجيل الدخول بنجاح!', 'success');
        
        setTimeout(() => {
          window.location.href = 'hosting-panel.html';
        }, 1200);
      } else {
        err.textContent = '❌ ' + (result.error || 'اسم المستخدم أو كلمة المرور غير صحيحة');
        err.style.display = 'block';
        
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    } catch (error) {
      err.textContent = '❌ حدث خطأ في الاتصال بالسيرفر';
      err.style.display = 'block';
      
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  // Check server status
  async function checkServerStatus() {
    const statusEl = document.getElementById('serverStatus');
    const dotEl = document.getElementById('statusDot');
    
    try {
      const response = await fetch('/api/health');
      if (response.ok) {
        statusEl.textContent = 'يعمل بشكل طبيعي';
        statusEl.classList.remove('offline');
        dotEl.classList.remove('offline');
      } else {
        statusEl.textContent = 'غير متاح';
        statusEl.classList.add('offline');
        dotEl.classList.add('offline');
      }
    } catch (e) {
      statusEl.textContent = 'غير متاح';
      statusEl.classList.add('offline');
      dotEl.classList.add('offline');
    }
  }

  // Check maintenance status
  async function checkMaintenanceStatus() {
    try {
      const response = await fetch('/api/admin/maintenance/status');
      const data = await response.json();
      
      if (data.maintenance) {
        const screen = document.getElementById('maintenanceScreen');
        const msgEl = document.getElementById('maintenanceMsg');
        msgEl.textContent = data.message || 'النظام تحت الصيانة، سيعود قريباً 🔧';
        screen.classList.add('active');
        document.getElementById('loginCard').style.display = 'none';
      }
    } catch (e) {}
  }

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  // Initialize
  generateParticles();
  checkServerStatus();
  checkMaintenanceStatus();
  
  // Check status periodically
  setInterval(checkServerStatus, 30000);
</script>

</body>
</html>
